name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write           # write so the screenshot job can commit previews
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build-sha + diary manifest
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
          ls -la build-sha.txt build-sha.js diary/manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site (previews/ is a repo record, not site content)
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a --exclude='/previews' --exclude='/.git' --exclude='/.github' ./ "$RUNNER_TEMP/site/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true   # transient "try again later" API failures (2026-07-03); retried below

      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy (transient Pages failure)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

  screenshot:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5   # if Playwright/Chromium install hangs, fail fast
                         # to avoid blocking the concurrency: pages group
    permissions:
      contents: write
    steps:
      - name: Checkout (with full history so we can push back)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm install --no-save playwright@1.49.0
          npx playwright install --with-deps chromium

      - name: Wait for Pages to settle
        run: sleep 25

      - name: Capture screenshots (all views from scripts/views.json)
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          mkdir -p previews
          DATE_TAG="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          # Manifest-driven loop. Home view lands at previews/<date>-<sha>.png
          # (unsuffixed, preserving wait-for-deploy.sh's contract); additional
          # views land at previews/<date>-<sha>-<view>.png. Add a view by
          # editing scripts/views.json — no workflow change needed.
          node scripts/screenshot.js --manifest scripts/views.json \
            "$PAGE_URL" previews "$DATE_TAG" "$SHA_SHORT"

      - name: Commit screenshots if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain previews/)" ]]; then
            DEPLOY_SHA="$(git rev-parse --short HEAD)"   # the commit whose deploy we screenshotted
            git add previews/
            git commit -m "ci: deploy preview for ${DEPLOY_SHA}" -m "[skip ci]"
            git push
          else
            echo "no screenshot changes to commit"
          fi
