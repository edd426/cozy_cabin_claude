name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write           # write so the screenshot job can commit previews
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build-sha + diary manifest
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
          ls -la build-sha.txt build-sha.js diary/manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site (previews/ is a repo record, not site content)
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a --exclude='/previews' --exclude='/.git' --exclude='/.github' ./ "$RUNNER_TEMP/site/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true   # transient "try again later" API failures (2026-07-03); retried below

      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy (transient Pages failure)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

  screenshot:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5   # if Playwright/Chromium install hangs, fail fast
                         # to avoid blocking the concurrency: pages group
    permissions:
      contents: write
    steps:
      - name: Checkout (with full history so we can push back)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm install --no-save playwright@1.49.0
          npx playwright install --with-deps chromium

      - name: Wait for Pages to settle
        run: sleep 25

      - name: Capture screenshots (all views from scripts/views.json)
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          mkdir -p previews
          DATE_TAG="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          # Manifest-driven loop. Home view lands at previews/<date>-<sha>.png
          # (unsuffixed, preserving wait-for-deploy.sh's contract); additional
          # views land at previews/<date>-<sha>-<view>.png. Add a view by
          # editing scripts/views.json — no workflow change needed.
          node scripts/screenshot.js --manifest scripts/views.json \
            "$PAGE_URL" previews "$DATE_TAG" "$SHA_SHORT"

      - name: Capture forced-state gallery (hours + seasons the schedule can't reach)
        # The nightly deploy lands ~00:10 UTC (sky.js bins that as night) in a
        # summer month, so the manifest step above only ever records night-summer.
        # This forces data-tod / data-season and captures the home view in each
        # gated state (messages/2026-07-17 "see your own work"). continue-on-error
        # is deliberate: a gallery failure must never block the home preview commit
        # below — that unsuffixed PNG is wait-for-deploy.sh's locked contract, and
        # the manifest step already wrote it before this step runs.
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          DATE_TAG="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          node scripts/screenshot.js --gallery \
            "$PAGE_URL" previews "$DATE_TAG" "$SHA_SHORT"

      - name: Capture motion filmstrips (the moving things a still can't prove)
        # Half the clearing moves — the smoke leaning downwind, the flag, the
        # swaying crowns, the night fireflies — and every still in the record
        # (manifest + gallery) swears none of it. This captures the home scene six
        # frames a beat apart and composites each into one read-left-to-right strip
        # (messages/2026-07-17 "see your own work", motion slice). continue-on-error
        # for the same reason as the gallery: a motion hiccup must never block the
        # unsuffixed home preview that wait-for-deploy.sh's locked contract needs —
        # the manifest step already wrote it before this step runs.
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          DATE_TAG="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          node scripts/screenshot.js --motion \
            "$PAGE_URL" previews "$DATE_TAG" "$SHA_SHORT"

      - name: Capture cross-view motion strip (one wind told twice)
        # The --motion strips above read across TIME within one view. This one
        # reads across the HOUSE: the front face (smoke leans downwind) stacked
        # over the door side (smoke rises straight, that face looking down the
        # wind's throat), so the whole quiet proof that ONE wind blows through the
        # clearing sits in a single frame — a thing no single-view strip can show
        # (diary 2026-07-19 … 2026-07-22). continue-on-error for the same reason as
        # the gallery and motion steps: a hiccup here must never block the unsuffixed
        # home preview that wait-for-deploy.sh's locked contract needs — the manifest
        # step already wrote it before this step runs.
        continue-on-error: true
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          DATE_TAG="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          node scripts/screenshot.js --motion-cross \
            "$PAGE_URL" previews "$DATE_TAG" "$SHA_SHORT"

      - name: Commit screenshots if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain previews/)" ]]; then
            DEPLOY_SHA="$(git rev-parse --short HEAD)"   # the commit whose deploy we screenshotted
            git add previews/
            git commit -m "ci: deploy preview for ${DEPLOY_SHA}" -m "[skip ci]"
            git push
          else
            echo "no screenshot changes to commit"
          fi
