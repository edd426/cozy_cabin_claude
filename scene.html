<!--
  scene.html — agent-mutable.
  The cabin scene, front (south/window) face. Loaded inline into #scene-mount
  by index.html. Do not include <html>, <head>, or <body>.

  Day 25 (2026-06-02): the cabin itself is now drawn in CSS (the .front-cabin
  block in scene.css), retiring the original Day-0 PNG so the home view is the
  same hand-built house as the around and inside views — part of the remaking
  in messages/open/2026-05-30-visual-coherence.md. The trees are still Sprout
  Lands sprites (assets/composed/); the smoke, path, flowers, bee, and birds are
  drawn from scratch in CSS.
-->
<div class="scene scene--exterior">
  <div class="scene__sky"></div>
  <div class="scene__ground"></div>

  <!-- The map card (Day 35): the diegetic way between views — tap to open
       /map/, whose zones travel everywhere. Replaces the bottom nav strip
       (kept hidden for keyboards/screen readers; see scene.css). -->
  <a class="map-button" href="map/" aria-label="open the map of the clearing">
    <span class="map-button__plan" aria-hidden="true"></span>
  </a>

  <!-- Front face of the cabin, rebuilt in CSS (Day 25) to retire the Day-0
       PNG and make the home view the same building as the around view — same
       plank wall, shingle-band roof, and chimney-with-ink-cap idiom as
       around.css. This is the short (south/window) face per the map plan;
       the around view is the long (east/door) face. See
       messages/open/2026-05-30-visual-coherence.md. Children paint in DOM
       order: chimney first (its base hides behind the roof), then roof, wall,
       and the brick-filled window on top. -->
  <div class="front-cabin" role="img"
       aria-label="The same wooden cabin seen head-on: a warm plank wall under a shingled roof, a brick chimney with a dark cap rising behind, and a brick-filled window at its centre. Drawn to match the side view — one building.">
    <div class="front-cabin__chimney">
      <span class="chimney-brick">
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
      </span>
    </div>
    <div class="front-cabin__roof"></div>
    <div class="front-cabin__wall"></div>
    <div class="front-cabin__window">
      <span class="front-cabin__brick">
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
      </span>
    </div>
  </div>

  <div class="sprite sprite--smoke" aria-hidden="true">
    <span class="smoke-puff smoke-puff--1"></span>
    <span class="smoke-puff smoke-puff--2"></span>
    <span class="smoke-puff smoke-puff--3"></span>
  </div>

  <div class="sprite sprite--path" aria-hidden="true">
    <span class="path-stone path-stone--1"></span>
    <span class="path-stone path-stone--2"></span>
    <span class="path-stone path-stone--3"></span>
    <span class="path-stone path-stone--4"></span>
    <span class="path-stone path-stone--5"></span>
  </div>

  <div class="sprite sprite--flowers" aria-hidden="true">
    <span class="flower flower--1"><span class="flower__head"></span></span>
    <span class="flower flower--2"><span class="flower__head"></span></span>
    <span class="flower flower--3"><span class="flower__head"></span></span>
  </div>

  <span class="sprite sprite--bee" aria-hidden="true">
    <span class="bee__wings"></span>
  </span>

  <span class="sprite sprite--birds" aria-hidden="true">
    <span class="bird bird--1"></span>
    <span class="bird bird--2"></span>
    <span class="bird bird--3"></span>
    <span class="bird bird--4"></span>
    <span class="bird bird--5"></span>
  </span>

  <img class="sprite sprite--tree sprite--tree-left"
       src="assets/composed/tree-01.png"
       width="28" height="33"
       alt="">

  <img class="sprite sprite--tree-small sprite--tree-right"
       src="assets/composed/tree-small.png"
       width="15" height="33"
       alt="">
</div>
