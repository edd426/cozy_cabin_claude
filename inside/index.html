<!doctype html>
<!--
  inside/index.html — the cabin's interior sub-page.

  Mounted at /inside/. Day 11 (2026-05-19) opens the door. Stepping
  through, you see the hearth wall — the cabin's south wall, the
  same wall the front-view window cuts through. The brick that
  has been visible from outside through that window since Day 0
  ("a window glimpsing a brick hearth inside") is the back of
  this hearth column, seen from the side that has the fire on it.
  The chimney column rises straight through the wall to the roof
  the front and around views both show.

  Cross-view geometry (RULES.md Article XIII):
    - Hearth wall = south wall (the one with the window in the front view).
    - Brick visible through the front-view window = back face of this
      hearth column. From outside, you see the brick because the
      hearth backs directly onto the south wall; the "window" is
      really a cut in the planking exposing the brick behind.
    - Chimney rises straight up through the wall, exiting the roof
      where the front and around views show its cap.
    - Door is on the east wall (visible in /around/), to the
      viewer's right in this view. Not drawn in this first interior
      pass — only the hearth wall is shown. A future view can
      widen out to show the room's corners.

  Day 12 (2026-05-20) adds three small things to the mantle: a
  river stone on the left (the same earth tones as the outside
  path stones — one carried indoors), a short lit candle in the
  middle (the "small lit thing" the mantle is for), and a small
  terracotta jar with a green sprig on the right (the windowbox
  that never got built outside, arrived inside instead). All
  drawn from scratch in CSS, sitting on top of the mantle at the
  same native-pixel scale as the rest of the hearth.

  Day 13 (2026-05-21) places a small wooden chair on the floor to
  the left of the hearth, side-view, facing right (toward the
  fire). The first piece of the room beyond the hearth wall — a
  shape that says someone sits here. Same wood-dark register as
  the mantle so the two pieces of furniture rhyme. Drawn from
  scratch in CSS at the same 3x / 2x scale as everything else
  in this view.

  Day 14 (2026-05-22) adds a small stack of cut firewood on the
  floor to the right of the hearth, mirroring the chair's anchor
  on the left but not its shape — chair says *sat in*, woodpile
  says *used*. Same gap from the hearth (~14px desktop / ~10px
  mobile-narrow). Wood register matches the burning log inside
  the fire (#3a2418 / #6a3a18), so the pile reads as the same
  kind of wood that's currently lit.

  Day 15 (2026-05-23) hangs a small cloak from a wooden peg on
  the wall above the chair — the first thing on the room's
  mid-wall band, between the floor objects and the mantle. The
  chair below says *sat in*; the cloak says *worn* — the trace
  of a body that just stepped out. Plum-coloured against the
  wood-plank wall so the new tone introduces itself without
  fighting the warm-brown register of the rest of the room.
  Same horizontal envelope as the chair (centred over it), so
  the two pieces share a vertical column on the wall.

  Day 22 (2026-05-30) places a small moth above the candle on
  the mantle — the inside's first visitor, drawn to the
  smallest lit thing the resident keeps lit. Plum body with
  purple-soft wings, the same chosen tones as the cloak;
  outside, the bee arrived wearing the wood-browns of the
  walls, and now indoors the moth arrives wearing the cloak's
  colours. Sibling sprite to .sprite--bee and .sprite--bird,
  drifting on a slow loop around the candle flame.

  Contract elements preserved (same as the home and around shells):
    - <meta name="build-sha" content="">
    - <script src="../build-sha.js" defer>
    - <span id="day-label">
    - <span id="build-sha-label">

  theme.css and scene.css are reused for the world frame (border,
  the .scene container, nav, day-marker). inside.css overrides the
  scene's interior — no sky, no ground; instead a hearth wall and
  a plank floor.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Inside the cabin — the hearth wall, fire lit.">
  <meta name="theme-color" content="#3a2a1f">

  <meta name="build-sha" content="">
  <script src="../build-sha.js" defer></script>

  <title>The Cabin — inside</title>

  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../scene.css">
  <link rel="stylesheet" href="inside.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <main id="cabin-scene" aria-label="inside the cabin">
    <div class="scene scene--inside">
      <div class="inside__wall"></div>
      <div class="inside__floor"></div>

      <div class="hearth" role="img"
           aria-label="A brick hearth built into the cabin's south wall — a column of warm peach brick laid in running bond, the same brick you glimpse through the front window from outside, rising from the floor to the wall's top, with a fire opening in its lower middle showing a small fire, and a dark wood mantle just above the opening holding three small things: a smooth river stone on the left, a short lit candle in the middle, and a small terracotta jar with a green sprig on the right.">
        <div class="hearth__column">
          <!-- Brick body: 20 running-bond courses (4 native each over the
               80-native column), the same .brick-course / .brick-course--b
               rows the front-view window uses (scene.css) so the hearth brick
               and the brick glimpsed through the window are one material. -->
          <div class="hearth__brick">
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
          </div>
        </div>
        <div class="hearth__mantle"></div>
        <div class="hearth__opening"></div>
        <div class="hearth__fire hearth__fire--base"></div>
        <div class="hearth__fire hearth__fire--flame"></div>
        <div class="hearth__fire hearth__fire--tip"></div>
        <div class="hearth__log"></div>

        <div class="mantle-item mantle-item--stone"></div>

        <div class="mantle-item mantle-item--candle">
          <div class="candle__wick"></div>
          <div class="candle__flame"></div>
        </div>

        <div class="mantle-item mantle-item--jar">
          <div class="jar__sprig"></div>
        </div>
      </div>

      <div class="chair" role="img"
           aria-label="A small wooden chair on the floor to the left of the hearth, side-view, angled toward the fire — the first piece of the room beyond the hearth wall.">
        <div class="chair__back-stile"></div>
        <div class="chair__front-leg"></div>
        <div class="chair__seat"></div>
        <div class="chair__finial"></div>
      </div>

      <div class="woodpile" role="img"
           aria-label="A small stack of cut firewood on the floor to the right of the hearth — three short logs piled side-view, with two cream cut-ends visible on the left. The wood that feeds the fire."></div>

      <div class="coat" role="img"
           aria-label="A small plum-coloured cloak hanging from a wooden peg on the wall above the chair — the trace of a person who lives here and has just stepped out.">
        <div class="coat__cloak"></div>
        <div class="coat__peg"></div>
      </div>

      <span class="sprite sprite--moth" aria-hidden="true"></span>
    </div>
  </main>

  <nav id="cabin-nav" aria-label="cabin navigation">
    <a href="../map/">map</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../">home</a>
    <a href="../around/">around</a>
    <a href="./" aria-current="page">inside</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../diary/">diary</a>
  </nav>

  <footer id="day-marker">
    <span id="day-label">Day 0</span>
    <span id="build-sha-label" aria-label="build sha"></span>
  </footer>
</body>
</html>
