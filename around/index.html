<!doctype html>
<!--
  around/index.html — the round-the-side sub-page.

  Mounted at /around/. Day 5 (2026-05-13) scaffolded the side-view
  cabin shape; Day 6 (2026-05-14) cut the door into it; Day 7
  (2026-05-15) laid stepping stones leading up to the door. Day 9
  (2026-05-17) re-angled those stones so they arrive at the door
  from the lower-left rather than head-on, per the cross-view
  geometry now required by RULES.md Article XIII (and to compose
  with the front-view path's south-east sweep). The view is
  committed as the cabin's right/east side; the cabin's front
  (south, with the window) is to the viewer's left, the cabin's
  back (north) to the viewer's right. No window here — the window
  lives on the front face. See
  messages/open/2026-05-11-door-or-window.md for the multi-day plan.

  Contract elements preserved (same as the home shell):
    - <meta name="build-sha" content="">
    - <script src="../build-sha.js" defer>
    - <span id="day-label">
    - <span id="build-sha-label">

  The cabin shape is inlined here rather than fetched via a separate
  fragment, because the around page is small and a fetch round-trip
  would just complicate the load. theme.css and scene.css are reused
  so the world frame (border, sky, ground) matches the home page.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="The cabin from the side — around toward the door.">
  <meta name="theme-color" content="#3a2a1f">

  <meta name="build-sha" content="">
  <script src="../build-sha.js" defer></script>

  <!-- Lights the sky to the visitor's real hour (soft dawn/dusk/night wash); see sky.js.
       Same component as the home view — one sky, one hour, both faces. -->
  <script src="../sky.js" defer></script>

  <!-- Leans the whole clearing to the real season (the year's clock, gentle wash); see season.js.
       Same component as the home view — one year, both exterior faces. -->
  <script src="../season.js" defer></script>

  <!-- Grows the potted plant by the door on time's own clock (Day 67, 2026-07-14):
       reads assets/composed/door-plant.json and opens new blooms as the days pass,
       the way garden.js grows the front flowerbed. Graceful — the pot keeps its two
       potted-with flecks if JS is off. Around-view only; see door-plant.js. -->
  <script src="../door-plant.js" defer></script>

  <title>The Cabin — around</title>

  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../scene.css">
  <link rel="stylesheet" href="around.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <main id="cabin-scene" aria-label="the cabin from the side">
    <div class="scene scene--around">
      <div class="scene__sky"></div>
      <div class="scene__ground"></div>

      <!-- Distant hills on the EASTERN horizon (Day 41): the side face's own far
           edge. Day 40 raised a range on the SOUTH skyline (the bench's view);
           yesterday's diary asked whether the other faces of the house are owed
           their own distance too, or whether a view is earned one window at a
           time. The answer drawn here: the clearing is ringed by one continuous
           range, and the side view catches a DIFFERENT stretch of it — the
           clearing's far/north back edge wrapping around the corner on the
           right, then the land opening flat to the left toward the front of the
           house and the path. (Corrected Day 48 from the mirror-image
           arrangement it had before — the map says the door side is seen from
           the east looking west, so the back edge belongs on the right.) Not a
           copy of the south skyline (that would be the same hills facing the
           wrong way); a distinct, asymmetric silhouette — bunched right, tapering
           to an open horizon on the left — so the two faces read as one ringed
           clearing seen from two angles, not two unrelated backdrops (RULES Art
           XIII).
           Reuses the shared .sprite--hills container and .hill base from
           scene.css (loaded by this page) unchanged — same two hazed sage tones,
           same base-on-the-horizon seating, same z-index 0 behind everything;
           only the per-hill arrangement (.hill--e-*) is around-specific. -->
      <div class="sprite sprite--hills" aria-hidden="true">
        <span class="hill hill--e-far-r"></span>
        <span class="hill hill--e-far-c"></span>
        <span class="hill hill--e-near-r"></span>
        <span class="hill hill--e-near-c"></span>
      </div>

      <!-- Clouds (Day 42): the same weather the home view got, hung over the
           side face too. A cloud belongs to no one wall, so the side sky drifts
           its own pair — a different stretch of the same overcast, not a copy
           (.cloud--e-* in around.css set the east placement; the .cloud shape,
           drift, and tone are the shared component in scene.css). -->
      <div class="sprite sprite--clouds" aria-hidden="true">
        <span class="cloud cloud--e-1"></span>
        <span class="cloud cloud--e-2"></span>
      </div>

      <!-- Dawn ground-mist on the door side (Day 55, 2026-07-02): the front's
           dawn haze (Day 54) carried round the corner — but NOT the way the
           fireflies were. The fireflies are a thing the meadow DOES, so they
           have a home yard and the door side caught only a stray spark or two
           (Day 53). Fog is a thing the AIR does, and the air over this clearing
           is one air: a cool dawn lies flat over every low patch of grass at
           once. So the door side gets its OWN full bank, not a borrowed wisp —
           the same white breath seen from the other side. Reuses the shared
           .sprite--dawnmist layer and .mist-wisp base from scene.css (loaded by
           this page) UNCHANGED — same cool near-white air that takes the dawn's
           rose rather than making light, same slow sideways creep, same z-index 1
           (behind the cabin, below the hour-wash) and the same data-tod="dawn"
           gate scene.css already carries (nothing by day/dusk/night, only at
           dawn). Only the per-bank placement (.mist-wisp--e-* in around.css) is
           door-side specific: laid to THIS face's low ground — heaviest to the
           left where the far yard opens flat toward the front and the path
           (south), thinning to a thread along the feet of the hills on the right,
           the way fog pools where the ground lies lowest. A distinct arrangement,
           not a copy of the front's, so the two banks read as one weather over
           one clearing seen from two angles (RULES Art XIII). %-positioned, so —
           like the front's — no mobile px rebase. Pointer-inert. -->
      <div class="sprite sprite--dawnmist" aria-hidden="true">
        <span class="mist-wisp mist-wisp--e-1"></span>
        <span class="mist-wisp mist-wisp--e-2"></span>
        <span class="mist-wisp mist-wisp--e-3"></span>
      </div>

      <!-- The map card (Day 35): the diegetic way between views — tap to open
           /map/. Replaces the bottom nav strip (kept hidden for keyboards and
           screen readers; see scene.css). -->
      <a class="map-button" href="../map/" aria-label="open the map of the clearing">
        <span class="map-button__plan" aria-hidden="true"></span>
      </a>

      <div class="side-cabin" role="img"
           aria-label="The same wooden cabin, seen from the side: a longer plank wall under a shingled roof with a brick chimney, dark-capped, rising from the middle. A dark wooden door is cut into the wall directly beneath the chimney, reaching the ground.">
        <div class="side-cabin__wall"></div>
        <div class="side-cabin__roof"></div>
        <div class="side-cabin__chimney">
          <span class="chimney-brick">
            <span class="brick-course brick-course--a"></span>
            <span class="brick-course brick-course--b"></span>
            <span class="brick-course brick-course--a"></span>
            <span class="brick-course brick-course--b"></span>
          </span>
        </div>
      </div>

      <!-- Smoke from the side chimney (Day 38, 2026-06-15). The front view has
           always shown the chimney smoking; this is the SAME stack on the SAME
           fire, so it must breathe here too (the founder's cross-view note in
           messages/open/2026-06-14-almost-one-place.md; RULES.md Article XIII).
           Reuses the .sprite--smoke / .smoke-puff component from scene.css
           (loaded by this page) unchanged: the side chimney is centred at 50%
           with the same 80-native top line as the front chimney, so the smoke's
           left:50% anchor and its bottom offset land it over the cap exactly as
           they do on the front face — one component, both views. -->
      <div class="sprite sprite--smoke" aria-hidden="true">
        <span class="smoke-puff smoke-puff--1"></span>
        <span class="smoke-puff smoke-puff--2"></span>
        <span class="smoke-puff smoke-puff--3"></span>
      </div>

      <!-- The door (Day 36, 2026-06-13): now a way in, not only a drawing of
           one. It sits OUTSIDE the role="img" cabin (children of role="img"
           are presentational, so a link inside it would vanish from the
           accessibility tree) and is positioned in scene coordinates over
           the same spot it has always occupied. Tap it to step inside —
           the first direct way between two rooms that doesn't pass through
           the map. -->
      <a class="side-cabin__door" href="../inside/"
         aria-label="push the door open and step inside">
        <span class="side-cabin__handle" aria-hidden="true"></span>
      </a>

      <!-- Porch lantern (Day 49, 2026-06-26): a small iron-and-glass lantern
           mounted on the wall beside the door. Dark through the long middle of
           the day; at the day's dim edges and after dark it kindles to a warm
           gold, taking the SAME hour the sky keeps (sky.js sets data-tod on
           .scene; until now only the ambient ::after wash and the inside window
           answered it). It is the first light *source* in the clearing the dark
           turns ON rather than off — a lamp left burning by the door for whoever
           comes up the path at a late hour, the welcome made literal. It lives
           on the east/door face only, beside the entrance, and owes no twin on
           the front (the front never shows this lamp's wall — CLAUDE.md "a wall
           no view shows is free"). Decorative: aria-hidden, pointer-events:none,
           clear of the door's tap pad. -->
      <div class="cabin-lantern" aria-hidden="true">
        <span class="cabin-lantern__bracket"></span>
        <span class="cabin-lantern__cap"></span>
        <span class="cabin-lantern__body"></span>
        <span class="cabin-lantern__base"></span>
      </div>

      <!-- Boots by the door (Day 50, 2026-06-27): a pair of small leather boots
           set on the grass just left of the entrance, toes turned toward the path.
           The continuation of yesterday's lantern thread (diary 2026-06-26): a lit
           lamp says someone meant for you to arrive, and the open question was
           whether the cabin could hold an honest sign of a resident without ever
           drawing a figure. The answer drawn here is the oldest one — a thing left
           *empty* in the shape of the person who'd fill it. Empty boots say "someone
           lives here" and "no one is here, come in" in the same breath: read them
           as just-stepped-out-of, or as set out for you. No figure, so the room the
           cabin has kept open by never drawing anyone stays open. Door-face only,
           like the lantern — owes no twin on the front (CLAUDE.md "a wall no view
           shows is free"). A passive ground object: it takes the ambient hour-wash
           (::after, z 5) like the grass it stands on — gold at dusk, dusk-blue at
           night — but is no light source itself (that's the lantern's job).
           Decorative: aria-hidden, pointer-events:none, well clear of the door pad. -->
      <div class="door-boots" aria-hidden="true">
        <span class="door-boots__boot door-boots__boot--back"></span>
        <span class="door-boots__boot door-boots__boot--front"></span>
      </div>

      <!-- Potted plant by the door (Day 66, 2026-07-13): a small terracotta pot
           of leafy green on the grass just right of the entrance, a fleck or two
           of rose worked through it. After a week walking the clearing BACKWARD —
           auditing each old thing for whether it had quietly fallen out of true as
           the world grew around it (the trees standing dead in the wind, the hills
           taking the dawn flat) — this is the week turning forward again: a NEW
           thing set down rather than an old one re-fitted (diary 2026-07-13). It's
           the first door-side thing that isn't weather, light, or a trace of
           someone leaving — it's a GROWING thing, tended. Drawn to belong without
           copying: the pot is the same earth-terracotta (#c19465) as the front/
           around path stones and the inside mantle jar; the green is the front
           flowerbed's sage (--c-grass tokens); the rose flecks are the front
           blooms' and the mailbox flag's colour (--c-rose). Three registers the
           clearing already held, gathered into one object that repeats none of
           them. Door-face only, like the boots and lantern — owes no twin on the
           front (CLAUDE.md "a wall no view shows is free"). A passive ground
           object at z-index 2: the ambient hour-wash (.scene::after, z5) colours
           it with the grass — gold at dusk, dusk-blue at night — but it is no
           light source. Drawn from scratch in native px at the same --s scale as
           the boots/lantern/cabin so it reads at one size with the building.
           Decorative: aria-hidden, pointer-inert, clear of the door's tap pad. -->
      <div class="door-plant" aria-hidden="true">
        <span class="door-plant__foliage"></span>
        <span class="door-plant__pot"></span>
        <span class="door-plant__rim"></span>
      </div>

      <div class="around-path" aria-hidden="true">
        <span class="around-path__stone around-path__stone--front"></span>
        <span class="around-path__stone around-path__stone--mid"></span>
        <span class="around-path__stone around-path__stone--back"></span>
      </div>

      <!-- Stray fireflies on the door side (Day 53, 2026-06-30): the edge of the
           FRONT yard's meadow reaching round the corner. Day 52 (diary 2026-06-29)
           let fireflies up over the front clearing and asked whether the door side
           should catch a stray spark or two of its own — not a feature, just the
           same June dark continuing past the wall. The answer drawn here: a warm
           June night fills with fireflies wherever there's grass, and the door side
           is grass too, so the same evening honestly carries a couple of sparks
           round the corner. But only a couple — two, not the front's six — kept low
           over the grass on the LEFT, out where the path leans south toward the
           front of the house, well clear of the door and the lantern's gold. The
           asymmetry the night-arc has kept holds: the front's night-welcome is the
           wild ownerless meadow-light it makes for no one; the door side's is the
           MADE lamp someone hung and lit for you. These strays don't give the door
           side a second meadow — they're the spillover of the front's own swarm, so
           the lamp stays this face's real night-light. Reuses the shared
           .sprite--fireflies layer and .firefly base from scene.css (loaded by this
           page) UNCHANGED — same green-gold core + halo, same blink/drift, same
           hour-gated fade (dusk 0.7 / night 1, nothing by day): one component, both
           faces. Only the per-spark placement (.firefly--e-* below) is door-side
           specific, a sparser left-leaning scatter so the two views read as one
           clearing on one June night, not two yards that each happen to have bugs.
           %-positioned in the full-bleed layer, so — like the front's — no mobile
           px rebase. Pointer-inert (the layer carries pointer-events:none). -->
      <div class="sprite sprite--fireflies" aria-hidden="true">
        <span class="firefly firefly--e-1"></span>
        <span class="firefly firefly--e-2"></span>
      </div>
    </div>
  </main>

  <nav id="cabin-nav" aria-label="cabin navigation">
    <a href="../map/">map</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../">home</a>
    <a href="./" aria-current="page">around</a>
    <a href="../inside/">inside</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../diary/">diary</a>
  </nav>

  <footer id="day-marker">
    <span id="day-label">Day 0</span>
    <span id="build-sha-label" aria-label="build sha"></span>
  </footer>
</body>
</html>
