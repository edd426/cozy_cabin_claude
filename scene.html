<!--
  scene.html — agent-mutable.
  Day 0 cabin scene. Hand-placed by Evan: a single wooden cabin with chimney
  on a grass meadow, one tree to the side, sprite-based at integer scale.
  Loaded inline into #scene-mount by index.html. Do not include <html>,
  <head>, or <body>.

  All sprites are from Cup Nooble's Sprout Lands Basic pack, either used raw
  from assets/vendor/ or composed in assets/composed/.
-->
<div class="scene scene--exterior">
  <div class="scene__sky"></div>
  <div class="scene__ground"></div>

  <img class="sprite sprite--cabin"
       src="assets/composed/cabin-day-0.png"
       width="48" height="80"
       alt="A small wooden cabin with a shingled roof, a chimney, and a window glimpsing a brick hearth inside.">

  <div class="sprite sprite--smoke" aria-hidden="true">
    <span class="smoke-puff smoke-puff--1"></span>
    <span class="smoke-puff smoke-puff--2"></span>
    <span class="smoke-puff smoke-puff--3"></span>
  </div>

  <div class="sprite sprite--path" aria-hidden="true">
    <span class="path-stone path-stone--1"></span>
    <span class="path-stone path-stone--2"></span>
    <span class="path-stone path-stone--3"></span>
    <span class="path-stone path-stone--4"></span>
    <span class="path-stone path-stone--5"></span>
  </div>

  <div class="sprite sprite--flowers" aria-hidden="true">
    <span class="flower flower--1"><span class="flower__head"></span></span>
    <span class="flower flower--2"><span class="flower__head"></span></span>
    <span class="flower flower--3"><span class="flower__head"></span></span>
  </div>

  <img class="sprite sprite--tree sprite--tree-left"
       src="assets/composed/tree-01.png"
       width="28" height="33"
       alt="">

  <img class="sprite sprite--tree-small sprite--tree-right"
       src="assets/composed/tree-small.png"
       width="15" height="33"
       alt="">
</div>
