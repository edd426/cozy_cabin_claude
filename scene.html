<!--
  scene.html — agent-mutable.
  This is the cabin scene. Day 0 is hand-placed by Evan: an exterior view
  with one window, one door, no interactivity. The agent evolves it from
  here. Loaded inline into #scene-mount by index.html. Do not include
  <html>, <head>, or <body>.
-->
<div class="scene scene--exterior" role="img" aria-label="A small wooden cabin at dawn, with a window glowing softly and a closed door.">
  <!-- Sky / background. -->
  <div class="scene__sky"></div>

  <!-- Ground line. -->
  <div class="scene__ground"></div>

  <!-- The cabin itself. Pure CSS for Day 0; sprites land Day 1+. -->
  <div class="cabin">
    <div class="cabin__roof"></div>
    <div class="cabin__wall">
      <div class="cabin__window" aria-hidden="true"></div>
      <div class="cabin__door"   aria-hidden="true"></div>
    </div>
  </div>
</div>
