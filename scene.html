<!--
  scene.html — agent-mutable.
  The cabin scene, front (south/window) face. Loaded inline into #scene-mount
  by index.html. Do not include <html>, <head>, or <body>.

  Day 25 (2026-06-02): the cabin itself is now drawn in CSS (the .front-cabin
  block in scene.css), retiring the original Day-0 PNG so the home view is the
  same hand-built house as the around and inside views — part of the remaking
  in messages/open/2026-05-30-visual-coherence.md. The trees are still Sprout
  Lands sprites (assets/composed/); the smoke, path, flowers, bee, and birds are
  drawn from scratch in CSS.
-->
<div class="scene scene--exterior">
  <div class="scene__sky"></div>
  <div class="scene__ground"></div>

  <!-- Distant hills on the southern horizon (Day 40): the view the bench was
       built to face. Yesterday's bench (Day 39) looks out across the clearing
       toward the path that leaves it — and until today it looked at empty sky.
       These are a low, hazy range far beyond the meadow's edge: paler and
       softer than the near grass (atmospheric distance — far things go quiet
       and wash toward the sky), base-seated right on the horizon line so
       nothing floats (the founder's "ground plane is sacred" note — a landform
       on the skyline is the near meadow's far edge overlapping the hills'
       base, depth done right, not a thing hovering in the sky). Drawn from
       scratch in two hazed sage tones for a little depth within the range.
       Behind everything (z-index 0): the cabin, trees, and bench all stand
       nearer, in front of the far hills. This is the SOUTH view only — the
       east face (around view) keeps its open horizon; the bench faces south,
       so south is the face that earned a skyline. Different directions,
       different horizons — not a contradiction (RULES Art XIII). -->
  <div class="sprite sprite--hills" aria-hidden="true">
    <span class="hill hill--far-l"></span>
    <span class="hill hill--far-r"></span>
    <span class="hill hill--near-l"></span>
    <span class="hill hill--near-r"></span>
  </div>

  <!-- Clouds (Day 42): the first thing in the middle of the frame — between
       the near grass and the far hills, in the sky that has been empty cream
       since Day 0. A cloud belongs to no one face (a hill needs you to stand
       somewhere to see it; a cloud drifts over every direction), so it's how
       the whole place gets weather at once without choosing a wall. Shared
       component in scene.css; the around view hangs its own pair (.cloud--e-*).
       Soft, slow, behind everything (z-index 0) so the smoke passes in front. -->
  <div class="sprite sprite--clouds" aria-hidden="true">
    <span class="cloud cloud--s-1"></span>
    <span class="cloud cloud--s-2"></span>
  </div>

  <!-- Dawn ground-mist (Day 54, 2026-07-01): the waking edge's own welcome, the
       morning's answer to the evening fireflies. Where the fireflies are a WILD
       LIGHT the clearing makes at dusk-and-after, this is the wild ATMOSPHERE it
       makes at first light — a low fog the cool grass lays down and the day burns
       off. Hour-gated on the same data-tod (sky.js), but the mirror of the
       fireflies: nothing through the day, nothing at dusk or dark — only at DAWN.
       No lamp, no someone; the morning stays plainly itself, just given the haze a
       summer sunup already has. It sits BEHIND the cabin (z-index 1) and BELOW the
       hour-wash, so the house stands clear of it in the near foreground while the
       fog lies over the far meadow, and the dawn's rose lies across the fog the
       same as across the grass — a fog is not a light, it takes the light. Drawn
       from scratch in CSS, %-positioned so it needs no mobile rebase. Decorative,
       pointer-inert; JS-off means no data-tod and the meadow keeps its plain
       morning — the haze only ever belongs to the one waking hour. -->
  <div class="sprite sprite--dawnmist" aria-hidden="true">
    <span class="mist-wisp mist-wisp--1"></span>
    <span class="mist-wisp mist-wisp--2"></span>
    <span class="mist-wisp mist-wisp--3"></span>
  </div>

  <!-- The map card (Day 35): the diegetic way between views — tap to open
       /map/, whose zones travel everywhere. Replaces the bottom nav strip
       (kept hidden for keyboards/screen readers; see scene.css). -->
  <a class="map-button" href="map/" aria-label="open the map of the clearing">
    <span class="map-button__plan" aria-hidden="true"></span>
  </a>

  <!-- Front face of the cabin, rebuilt in CSS (Day 25) to retire the Day-0
       PNG and make the home view the same building as the around view — same
       plank wall, shingle-band roof, and chimney-with-ink-cap idiom as
       around.css. This is the short (south/window) face per the map plan;
       the around view is the long (east/door) face. See
       messages/open/2026-05-30-visual-coherence.md. Children paint in DOM
       order: chimney first (its base hides behind the roof), then roof, wall,
       and the brick-filled window on top. -->
  <div class="front-cabin" role="img"
       aria-label="The same wooden cabin seen head-on: a warm plank wall under a shingled roof, a brick chimney with a dark cap rising behind, and a brick-filled window at its centre. Drawn to match the side view — one building.">
    <div class="front-cabin__chimney">
      <span class="chimney-brick">
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
      </span>
    </div>
    <div class="front-cabin__roof"></div>
    <div class="front-cabin__wall"></div>
    <!-- The front wall carries ONE opening: the chimney/hearth column seen
         end-on, which is brick, not glass (it was never a window you could see
         through). The Day-45 glazed side window was removed on Day 48
         (messages/done/2026-06-24-front-window-and-inside-wall.md): two
         differently-shaped openings a pixel apart — one brick, one glass — read
         as two houses, not one. The inside view's window stays; it now lives on
         one of the two outside walls this world never draws (front and door are
         the only faces shown), so it needs no twin on the front. The "one hole,
         told true from both sides" idea is deferred, not dropped — it waits for
         the day a hidden wall is ever drawn from outside, where a window can
         honestly be the same hole on both faces. (CLAUDE.md, "A wall no view
         shows is free.") -->
    <div class="front-cabin__window">
      <span class="front-cabin__brick">
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
        <span class="brick-course brick-course--a"></span>
        <span class="brick-course brick-course--b"></span>
      </span>
    </div>
  </div>

  <div class="sprite sprite--smoke" aria-hidden="true">
    <span class="smoke-puff smoke-puff--1"></span>
    <span class="smoke-puff smoke-puff--2"></span>
    <span class="smoke-puff smoke-puff--3"></span>
  </div>

  <div class="sprite sprite--path" aria-hidden="true">
    <span class="path-stone path-stone--1"></span>
    <span class="path-stone path-stone--2"></span>
    <span class="path-stone path-stone--3"></span>
    <span class="path-stone path-stone--4"></span>
    <span class="path-stone path-stone--5"></span>
  </div>

  <div class="sprite sprite--flowers" aria-hidden="true">
    <span class="flower flower--1"><span class="flower__head"></span></span>
    <span class="flower flower--2"><span class="flower__head"></span></span>
    <span class="flower flower--3"><span class="flower__head"></span></span>
  </div>

  <span class="sprite sprite--bee" aria-hidden="true">
    <span class="bee__wings"></span>
  </span>

  <!-- A small wooden bench in the front yard (Day 39): a place to sit in the
       finished clearing, facing out toward the path rather than the house.
       Drawn from scratch in the cabin's wood tones; the first yard object that
       holds still rather than running on a clock. Built side-on (the clearest
       bench silhouette at this size): a plank seat with a slatted back rising
       behind it and two stout legs below. -->
  <span class="sprite sprite--bench" role="img"
        aria-label="A low wooden bench in the grass, facing out toward the clearing.">
    <span class="bench__back"></span>
    <span class="bench__seat"></span>
    <span class="bench__leg bench__leg--l"></span>
    <span class="bench__leg bench__leg--r"></span>
  </span>

  <!-- Woodpile against the cabin's front wall (Day 76, 2026-07-23): the first
       link of the fire that the whole clearing has been about. The chimney has
       smoked every hour and season I've drawn, the inside shows a fire on its
       hearth with a little pyramid of split logs beside it (the fuel, Day 14) —
       but out here there was never any wood you could see it come from. This is
       that wood: a low rick of cut billets stacked against the front wall's
       right foot, waiting to be carried in. Drawn from scratch in the SAME
       sawn-face-ringed-in-bark idiom and the same wood tones as the indoor
       woodpile (inside.css), so the two read as one kind of wood — the store
       outside, the armful already in by the hearth (material truth across
       views; RULES Art XIII). A still, used object like the bench and the box:
       it holds no clock and lights nothing, just takes the ambient hour- and
       season-wash (.scene::after / ::before, z 5) like the grass it stands on.
       Foot on the ground, body overlapping the wall's lower planks so it reads
       as stacked AGAINST the house and nothing floats (the ground plane stays
       sacred). South-face-only, like the flowers and the bench — a woodpile at
       the front wall's foot belongs to the face that shows it; the east/door
       view keeps its own yard. -->
  <span class="sprite sprite--woodpile" role="img"
        aria-label="A low pile of cut firewood stacked against the cabin's front wall — split logs seen end-on, their pale sawn faces ringed in dark bark, four along the bottom and three nestled in the valleys above. The store the chimney's smoke comes from.">
    <span class="woodpile-log woodpile-log--1"></span>
    <span class="woodpile-log woodpile-log--2"></span>
    <span class="woodpile-log woodpile-log--3"></span>
    <span class="woodpile-log woodpile-log--4"></span>
    <span class="woodpile-log woodpile-log--5"></span>
    <span class="woodpile-log woodpile-log--6"></span>
    <span class="woodpile-log woodpile-log--7"></span>
  </span>

  <!-- Mailbox at the head of the path (Day 59, 2026-07-06): the first thing out
       here that faces OUT toward the world rather than in toward whoever's
       already arriving. Everything else in the clearing is a welcome pointed
       inward — the smoke, the door-side boots and lamp, the tended flowers — and
       all of it says *someone lives here* while nothing says *who*, or tells the
       world the place has a name it can be found by. A mailbox is that name at
       the yard's edge: it stands there precisely when the house is empty, so the
       place stays addressable with no one home. It names the clearing without
       peopling it — the inverse of the boots (which say "someone, just now"): a
       name on a box says "someone, always" and "no one this minute" in the one
       mark, so the front's still, no-one's-here register is kept (the front owes
       no figure). Wren's name enters the scene here for the first time — carried
       on a small cream plate on the box side, in the pixel font the birds and
       day-label already use. Drawn from scratch in the cabin's wood tones; the
       flag is the rose accent the flowers introduced (the one warm colour out
       here), raised as a small sign of life. A passive ground object: it takes
       the ambient hour-wash (.scene::after, z 5) like the grass and the bench —
       gold at dusk, dusk-blue at night — but is no light source itself. Stands
       at the path's mouth on the viewer's side, foot on the front grass, post
       rising to the box so nothing floats (the ground plane stays sacred). -->
  <span class="sprite sprite--mailbox" role="img"
        aria-label="A small wooden mailbox on a post at the head of the path, its flag raised, a cream nameplate on the side reading WREN.">
    <span class="mailbox__post"></span>
    <span class="mailbox__flag-staff"></span>
    <span class="mailbox__flag"></span>
    <span class="mailbox__box"></span>
    <span class="mailbox__plate"></span>
    <span class="mailbox__name"></span>
  </span>

  <span class="sprite sprite--birds" aria-hidden="true">
    <span class="bird bird--1"></span>
    <span class="bird bird--2"></span>
    <span class="bird bird--3"></span>
    <span class="bird bird--4"></span>
    <span class="bird bird--5"></span>
  </span>

  <!-- Fireflies in the front yard (Day 52, 2026-06-29): the front face's own
       answer to the door side's lantern. Where the lantern is a MADE light hung
       by the door FOR a visitor, these are a WILD light the clearing makes on its
       own, for no one — the front stays the still, no-one's face (no lamp, no
       second pair of boots) and is simply given the life a summer evening already
       has. Hour-gated like the lantern (sky.js's data-tod): nothing at all
       through the day, then a few green-gold sparks low over the grass at dusk,
       more after dark. Each blinks and drifts on its own offset so the patch
       never pulses in sync (a firefly bobs and winks; it doesn't orbit). Drawn
       from scratch in CSS, %-positioned so it needs no mobile rebase. Decorative,
       pointer-inert; if JS is off there's no data-tod and the yard stays its
       plain daylight — the sparks only ever belong to the dim hours. -->
  <div class="sprite sprite--fireflies" aria-hidden="true">
    <span class="firefly firefly--1"></span>
    <span class="firefly firefly--2"></span>
    <span class="firefly firefly--3"></span>
    <span class="firefly firefly--4"></span>
    <span class="firefly firefly--5"></span>
    <span class="firefly firefly--6"></span>
  </div>

  <img class="sprite sprite--tree sprite--tree-left"
       src="assets/composed/tree-01.png"
       width="28" height="33"
       alt="">

  <img class="sprite sprite--tree-small sprite--tree-right"
       src="assets/composed/tree-small.png"
       width="15" height="33"
       alt="">
</div>
