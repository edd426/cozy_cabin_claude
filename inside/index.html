<!doctype html>
<!--
  inside/index.html — the cabin's interior sub-page.

  Mounted at /inside/. Day 11 (2026-05-19) opens the door. Stepping
  through, you see the hearth wall — the cabin's south wall, the
  same wall the front-view window cuts through. The brick that
  has been visible from outside through that window since Day 0
  ("a window glimpsing a brick hearth inside") is the back of
  this hearth column, seen from the side that has the fire on it.
  The chimney column rises straight through the wall to the roof
  the front and around views both show.

  Cross-view geometry (RULES.md Article XIII):
    - Hearth wall = south wall (the one with the window in the front view).
    - Brick visible through the front-view window = back face of this
      hearth column. From outside, you see the brick because the
      hearth backs directly onto the south wall; the "window" is
      really a cut in the planking exposing the brick behind.
    - Chimney rises straight up through the wall, exiting the roof
      where the front and around views show its cap.
    - Door is on the east wall (visible in /around/), to the
      viewer's right in this view. Not drawn in this first interior
      pass — only the hearth wall is shown. A future view can
      widen out to show the room's corners.

  Day 12 (2026-05-20) adds three small things to the mantle: a
  river stone on the left (the same earth tones as the outside
  path stones — one carried indoors), a short lit candle in the
  middle (the "small lit thing" the mantle is for), and a small
  terracotta jar with a green sprig on the right (the windowbox
  that never got built outside, arrived inside instead). All
  drawn from scratch in CSS, sitting on top of the mantle at the
  same native-pixel scale as the rest of the hearth.

  Day 13 (2026-05-21) places a small wooden chair on the floor to
  the left of the hearth, side-view, facing right (toward the
  fire). The first piece of the room beyond the hearth wall — a
  shape that says someone sits here. Same wood-dark register as
  the mantle so the two pieces of furniture rhyme. Drawn from
  scratch in CSS at the same 3x / 2x scale as everything else
  in this view.

  Day 14 (2026-05-22) adds a small stack of cut firewood on the
  floor to the right of the hearth, mirroring the chair's anchor
  on the left but not its shape — chair says *sat in*, woodpile
  says *used*. Same gap from the hearth (~14px desktop / ~10px
  mobile-narrow). Wood register matches the burning log inside
  the fire (#3a2418 / #6a3a18), so the pile reads as the same
  kind of wood that's currently lit.

  Day 15 (2026-05-23) hangs a small cloak from a wooden peg on
  the wall above the chair — the first thing on the room's
  mid-wall band, between the floor objects and the mantle. The
  chair below says *sat in*; the cloak says *worn* — the trace
  of a body that just stepped out. Plum-coloured against the
  wood-plank wall so the new tone introduces itself without
  fighting the warm-brown register of the rest of the room.
  Same horizontal envelope as the chair (centred over it), so
  the two pieces share a vertical column on the wall.

  Day 22 (2026-05-30) places a small moth above the candle on
  the mantle — the inside's first visitor, drawn to the
  smallest lit thing the resident keeps lit. Plum body with
  purple-soft wings, the same chosen tones as the cloak;
  outside, the bee arrived wearing the wood-browns of the
  walls, and now indoors the moth arrives wearing the cloak's
  colours. Sibling sprite to .sprite--bee and .sprite--bird,
  drifting on a slow loop around the candle flame.

  Day 29 (2026-06-06) gives the moth its flutter — the first of
  the founder's deferred small-fixes (see messages/open/
  2026-05-30-visual-coherence.md). Its wings now flap between an
  up-stroke and a down-stroke, and its flight is an erratic
  dart-and-drift around the flame instead of a smooth ring,
  answering the founder's note that "a moth flutters and darts;
  it doesn't glide in a smooth circle like a spider on a thread."

  Day 36 (2026-06-13) is the legibility pass — the last of the
  founder's deferred small-fixes ("the cloak / woodpile / mantle
  stone -> only if they can be made to read at their size"). The
  cloak's silhouette now gathers narrow at a small peg and flares
  to its hem so it reads as hung cloth instead of a plum box; the
  woodpile is restacked end-on as a pyramid of pale sawn faces
  ringed in bark; the mantle stone loses its corners and gains a
  lit top so it reads as a pebble rather than a small brick.
  Silhouette, not detail — the founder's note named the lever.

  Day 31 (2026-06-08) sets the fire down onto its hearth — the
  second of the founder's deferred small-fixes ("the fire floating
  in the firebox -> rest it on the hearth floor (or a visible
  grate)"). A glowing ember bed now spans the firebox floor; the
  log sits on the coals and the flames rise off it with a base
  spread jamb-to-jamb, so the fire reads as seated under its own
  weight rather than a narrow flame marooned in a dark cavity.

  Day 47 (2026-06-24) sets a small glass tumbler on the window's
  sill — the day-lit thing the sill earns that the mantle never
  could. The mantle's three things (stone, candle, jar) are all
  fire-side and steady; this glass is the first object that answers
  to the sky instead. It's translucent (the meadow band shows
  through it) and takes the SAME hour-wash as .window__pane, so the
  glass and the panes behind it glow together — clear by day, gold
  at dusk, dusk-blue at night. The terracotta jar on the mantle and
  the glass on the sill are siblings: same small-vessel shape, one
  holding earth by the fire, the other holding the day's light.

  Contract elements preserved (same as the home and around shells):
    - <meta name="build-sha" content="">
    - <script src="../build-sha.js" defer>
    - <span id="day-label">
    - <span id="build-sha-label">

  theme.css and scene.css are reused for the world frame (border,
  the .scene container, nav, day-marker). inside.css overrides the
  scene's interior — no sky, no ground; instead a hearth wall and
  a plank floor.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Inside the cabin — the hearth wall, fire lit.">
  <meta name="theme-color" content="#3a2a1f">

  <meta name="build-sha" content="">
  <script src="../build-sha.js" defer></script>

  <!-- The window keeps the real hour (Day 46). sky.js tags the scene with the
       time of day; inside.css tints ONLY the window's glass with it (the room
       itself stays fire-lit and steady — a hearth doesn't go blue at dusk).
       The one square of the room that sees out is the one that keeps the hour. -->
  <script src="../sky.js" defer></script>

  <title>The Cabin — inside</title>

  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../scene.css">
  <link rel="stylesheet" href="inside.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <main id="cabin-scene" aria-label="inside the cabin">
    <div class="scene scene--inside">
      <div class="inside__wall"></div>
      <div class="inside__floor"></div>

      <!-- The map card (Day 35): indoors it reads as the plan of the place
           pinned to the wall — tap to open /map/. Replaces the bottom nav
           strip (kept hidden for keyboards and screen readers; scene.css). -->
      <a class="map-button" href="../map/" aria-label="open the map of the clearing">
        <span class="map-button__plan" aria-hidden="true"></span>
      </a>

      <div class="hearth" role="img"
           aria-label="A brick hearth built into the cabin's south wall — a column of warm peach brick laid in running bond, the same brick you glimpse through the front window from outside, rising from a low foot on the floor up and off the top of the frame as the chimney passes through the ceiling, with a fire opening down near the middle of the floor where a small fire rests on a glowing bed of coals, and a dark wood mantle higher up the column holding three small things: a smooth river stone on the left, a short lit candle in the middle, and a small terracotta jar with a green sprig on the right.">
        <div class="hearth__column">
          <!-- Brick body: running-bond courses (4 native each), the same
               .brick-course / .brick-course--b rows the front-view window uses
               (scene.css) so the hearth brick and the brick glimpsed through the
               window are one material. Day 38 (2026-06-15): the column now runs
               floor-to-ceiling-and-off-the-top, whose native height varies with
               the scene width, so the stack is deliberately OVER-supplied (44
               courses). .hearth__brick packs them from the bottom
               (justify-content:flex-end) and clips the surplus off the top with
               overflow:hidden — so the foot is always complete and the brick
               always reaches the frame's top edge, at any width. -->
          <div class="hearth__brick">
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
            <div class="brick-course"></div>
            <div class="brick-course brick-course--b"></div>
          </div>
        </div>
        <div class="hearth__mantle"></div>
        <div class="hearth__opening"></div>
        <div class="hearth__embers"></div>
        <div class="hearth__log"></div>
        <div class="hearth__fire hearth__fire--base"></div>
        <div class="hearth__fire hearth__fire--flame"></div>
        <div class="hearth__fire hearth__fire--tip"></div>

        <div class="mantle-item mantle-item--stone"></div>

        <div class="mantle-item mantle-item--candle">
          <div class="candle__wick"></div>
          <div class="candle__flame"></div>
        </div>

        <div class="mantle-item mantle-item--jar">
          <div class="jar__sprig"></div>
        </div>
      </div>

      <div class="chair" role="img"
           aria-label="A small wooden chair on the floor to the left of the hearth, side-view, angled toward the fire — the first piece of the room beyond the hearth wall.">
        <div class="chair__back-stile"></div>
        <div class="chair__front-leg"></div>
        <div class="chair__seat"></div>
        <div class="chair__finial"></div>
      </div>

      <div class="woodpile" role="img"
           aria-label="A small pyramid of cut firewood on the floor to the right of the hearth — three logs stacked end-on, their pale sawn faces ringed in dark bark, two below and one resting in the valley on top. The wood that feeds the fire.">
        <span class="woodpile__log woodpile__log--left"></span>
        <span class="woodpile__log woodpile__log--right"></span>
        <span class="woodpile__log woodpile__log--top"></span>
      </div>

      <!-- Window (Day 45, 2026-06-22): the room's first opening — a small
           wood-framed, four-pane window cut into the south (hearth) wall to
           the right of the chimney, above the woodpile. Until today the inside
           was "all fire and brick, no glass" (the Day-44 diary): lit only by
           the hearth, with no way for the day to reach the floor. This is the
           opening the light could come through — what it SEES is held simple
           for now (a calm pale sky over a band of meadow, the crossbar reading
           as the horizon), deferring the open question of whether the inside
           should keep the real hour the way the yard does. Cross-view geometry
           (RULES.md Article XIII): the south wall is the SAME wall the front
           view shows, so the same opening appears there — .front-cabin__-
           sidewindow in scene.html, glazed dark (a lit room glimpsed from the
           bright yard) where this one is glazed bright (the day glimpsed from
           the lit room). One hole, two readings. -->
      <div class="window" role="img"
           aria-label="A small four-pane window in the cabin's wall to the right of the hearth, above the woodpile — a wooden frame on a low sill, its panes showing a pale sky above and a band of green meadow below, divided by a cross of muntins whose horizontal bar reads as the horizon. On the sill stands a small glass tumbler that takes the same hour the panes do — clear by day, gold at dusk, dusk-blue at night. The room's first way to see out.">
        <div class="window__pane"></div>
        <div class="window__muntin-v"></div>
        <div class="window__muntin-h"></div>
        <div class="window__sill"></div>
        <!-- A small glass on the sill (Day 47, 2026-06-24): the day-lit thing the
             sill earns that the mantle never could. Built last so it paints over
             the pane + muntins (it stands in FRONT of the glass, nearest the
             room). Translucent so the meadow band shows through it; tinted by the
             hour with the SAME wash as .window__pane, so the glass and the panes
             behind it glow together — gold at dusk, dusk-blue at night. -->
        <div class="sill-glass" aria-hidden="true"></div>
      </div>

      <div class="coat" role="img"
           aria-label="A small plum-coloured cloak hanging from a wooden peg on the wall above the chair — gathered narrow at the peg, flaring toward its hem; the trace of a person who lives here and has just stepped out.">
        <div class="coat__cloak"></div>
        <div class="coat__shoulder"></div>
        <div class="coat__gather"></div>
        <div class="coat__peg"></div>
      </div>

      <span class="sprite sprite--moth" aria-hidden="true"></span>
    </div>
  </main>

  <nav id="cabin-nav" aria-label="cabin navigation">
    <a href="../map/">map</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../">home</a>
    <a href="../around/">around</a>
    <a href="./" aria-current="page">inside</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="../diary/">diary</a>
  </nav>

  <footer id="day-marker">
    <span id="day-label">Day 0</span>
    <span id="build-sha-label" aria-label="build sha"></span>
  </footer>
</body>
</html>
